<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洲美扶輪社 NO.634次例會暨第十四屆就職典禮 - 外賓報名系統</title>
    <style>
        :root {
            --primary-color: #0b3c5d; /* 皇家扶輪藍 */
            --accent-color: #d9b310;  /* 典雅金 */
            --bg-color: #f1f3f5;
            --card-bg: #ffffff;
            --text-color: #323232;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        /* 海報與活動資訊大卡片 */
        .poster-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            overflow: hidden;
            border-top: 6px solid var(--accent-color);
        }
        .poster-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
        .info-content {
            padding: 25px;
            background: linear-gradient(180deg, #ffffff 0%, #f9fbfd 100%);
        }
        .info-content h1 {
            margin: 0 0 15px 0;
            font-size: 20px;
            color: var(--primary-color);
            text-align: center;
            font-weight: bold;
            line-height: 1.4;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            margin: 15px 0;
        }
        .event-details {
            font-size: 15px;
            color: #555;
        }
        .event-details p {
            margin: 8px 0;
            display: flex;
            align-items: flex-start;
        }
        .event-details strong {
            color: var(--primary-color);
            min-width: 65px;
            display: inline-block;
        }
        /* 輸入卡片樣式 */
        .form-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
            font-size: 16px;
        }
        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #fcfcfc;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: var(--accent-color);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 8px rgba(217,179,16,0.15);
        }
        /* 單選鈕美化 */
        .radio-box-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 5px;
        }
        .radio-box-label {
            border: 2px solid #e9e9e9;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            display: block;
            font-weight: bold;
            transition: all 0.2s;
            background: #fafafa;
        }
        .radio-box-label input {
            display: none;
        }
        .radio-box-label:hover {
            border-color: var(--accent-color);
            background: #fffdf6;
        }
        input[type="radio"]:checked + .radio-text {
            color: var(--primary-color);
        }
        .radio-box-label:has(input[type="radio"]:checked) {
            border-color: var(--primary-color);
            background-color: #f4f8fa;
            box-shadow: 0 4px 10px rgba(11,60,93,0.08);
        }
        /* 動態顯示區塊 */
        .conditional-section {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary-color), #051d2e);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(11,60,93,0.2);
            transition: all 0.2s;
        }

            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(11,60,93,0.3);
