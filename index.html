<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洲美扶輪社 NO.634次例會暨第十四屆就職典禮 - 外賓報名系統</title>
    <style>
        :root {
            --primary-color: #0b3c5d; /* 皇家扶輪藍 */
            --accent-color: #d9b310;  /* 典雅金 */
            --bg-color: #f1f3f5;
            --card-bg: #ffffff;
            --text-color: #323232;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        /* 海報與活動資訊大卡片 */
        .poster-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            overflow: hidden;
            border-top: 6px solid var(--accent-color);
        }
        .poster-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
        .info-content {
            padding: 25px;
            background: linear-gradient(180deg, #ffffff 0%, #f9fbfd 100%);
        }
        .info-content h1 {
            margin: 0 0 15px 0;
            font-size: 20px;
            color: var(--primary-color);
            text-align: center;
            font-weight: bold;
            line-height: 1.4;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            margin: 15px 0;
        }
        .event-details {
            font-size: 15px;
            color: #555;
        }
        .event-details p {
            margin: 8px 0;
            display: flex;
            align-items: flex-start;
        }
        .event-details strong {
            color: var(--primary-color);
            min-width: 65px;
            display: inline-block;
        }
        /* 輸入卡片樣式 */
        .form-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
            font-size: 16px;
        }
        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #fcfcfc;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: var(--accent-color);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 8px rgba(217,179,16,0.15);
        }
        /* 單選鈕美化 */
        .radio-box-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 5px;
        }
        .radio-box-label {
            border: 2px solid #e9e9e9;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            display: block;
            font-weight: bold;
            transition: all 0.2s;
            background: #fafafa;
        }
        .radio-box-label input {
            display: none;
        }
        .radio-box-label:hover {
            border-color: var(--accent-color);
            background: #fffdf6;
        }
        /* 當被選取時的樣式改變 */
        input[type="radio"]:checked + .radio-text {
            color: var(--primary-color);
        }
        .radio-box-label:has(input[type="radio"]:checked) {
            border-color: var(--primary-color);
            background-color: #f4f8fa;
            box-shadow: 0 4px 10px rgba(11,60,93,0.08);
        }
        /* 動態顯示區塊 */
        .conditional-section {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--primary-color), #051d2e);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(11,60,93,0.2);
            transition: all 0.2s;
        }
        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(11,60,93,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="poster-card">
        <img src="https://lh3.googleusercontent.com/d/https://drive.google.com/file/d/19FIoPAAjD_cNDn9QdNU7LIsneSqat4IK/view?usp=sharing" alt="活動海報" class="poster-img" onerror="this.style.display='none';">
        
        <div class="info-content">
            <h1>洲美扶輪社 NO.634次例會<br>暨第十四屆就職典禮</h1>
            <div class="divider"></div>
            <div class="event-details">
                <p><strong>💡 主題：</strong>在洲美，有你有我，有意思</p>
                <p><strong>📅 時間：</strong>2026年07月07日 (二) 18:30 用餐聯誼 | 19:00 正式開始</p>
                <p><strong>📍 地點：</strong>台北市商業會 (台北市南京東路二段72號6樓，捷運松江南京站1號出口)</p>
                <p><strong>💵 費用：</strong>外賓註冊費 200 元</p>
            </div>
        </div>
    </div>

    <form id="registrationForm" action="https://script.google.com/macros/s/AKfycbwjuwUQ-bX3O7eW4sOcgIwZBGvT7ls2wuCivgnFrTZNM4MJQKmUCo-WRosvFqJNm4Eh/exec" method="GET">
        
        <div class="form-card">
            <div class="form-group" style="margin-bottom:0;">
                <label style="text-align: center;">請選擇您的身分開始填寫：</label>
                <div class="radio-box-group">
                    <label class="radio-box-label">
                        <input type="radio" name="isRotarian" value="yes" onchange="toggleSections()" required>
                        <span class="radio-text">扶輪社友</span>
                    </label>
                    <label class="radio-box-label">
                        <input type="radio" name="isRotarian" value="no" onchange="toggleSections()">
                        <span class="radio-text">一般來賓</span>
                    </label>
                </div>
            </div>
        </div>

        <div id="rotarianSection" class="form-card conditional-section">
            <div class="form-group">
                <label for="rotaryName">姓名</label>
                <input type="text" id="rotaryName" name="rotaryName" class="form-control" placeholder="請填寫您的姓名">
            </div>
            <div class="form-group">
                <label for="nickname">Nickname</label>
                <input type="text" id="nickname" name="nickname" class="form-control" placeholder="例如：Jerry">
            </div>
            <div class="form-group">
                <label for="rotaryClub">所屬扶輪社</label>
                <input type="text" id="rotaryClub" name="rotaryClub" class="form-control" placeholder="例如：台北洲美社">
            </div>
            <div class="form-group">
                <label for="rotaryTitle">扶輪職稱</label>
                <input type="text" id="rotaryTitle" name="rotaryTitle" class="form-control" placeholder="例如：社長 / PP / 社友">
            </div>
        </div>

        <div id="guestSection" class="form-card conditional-section">
            <div class="form-group">
                <label for="inviter">邀請人姓名</label>
                <input type="text" id="inviter" name="inviter" class="form-control" placeholder="請填寫邀請您的洲美社友姓名">
            </div>
            <div class="form-group">
                <label for="guestName">姓名</label>
                <input type="text" id="guestName" name="guestName" class="form-control" placeholder="請填寫您的姓名">
            </div>
            <div class="form-group">
                <label for="companyAndTitle">公司及職稱</label>
                <input type="text" id="companyAndTitle" name="companyAndTitle" class="form-control" placeholder="例如：XX有限公司 總經理">
            </div>
        </div>

        <div id="commonSection" class="form-card conditional-section">
            <div class="form-group">
                <label>飲食習慣</label>
                <div class="radio-box-group">
                    <label class="radio-box-label">
                        <input type="radio" name="diet" value="葷食" checked>
                        <span class="radio-text">葷食</span>
                    </label>
                    <label class="radio-box-label">
                        <input type="radio" name="diet" value="素食">
                        <span class="radio-text">素食</span>
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label for="note">備註說明 (選填)</label>
                <textarea id="note" name="note" class="form-control" rows="2" placeholder="如有其他特殊需求請在此註記"></textarea>
            </div>
            <button type="submit" class="btn-submit">確認送出報名</button>
        </div>

    </form>
</div>

<script>
    function toggleSections() {
        const isRotarian = document.querySelector('input[name="isRotarian"]:checked').value;
        const rotarianSection = document.getElementById('rotarianSection');
        const guestSection = document.getElementById('guestSection');
        const commonSection = document.getElementById('commonSection');
        
        const rotaryInputs = rotarianSection.querySelectorAll('input');
        const guestInputs = guestSection.querySelectorAll('input');

        if (isRotarian === 'yes') {
            rotarianSection.style.display = 'block';
            guestSection.style.display = 'none';
            commonSection.style.display = 'block';
            
            rotaryInputs.forEach(input => input.required = true);
            guestInputs.forEach(input => {
                input.required = false;
                input.value = '';
            });
        } else if (isRotarian === 'no') {
            rotarianSection.style.display = 'none';
            guestSection.style.display = 'block';
            commonSection.style.display = 'block';
            
            guestInputs.forEach(input => input.required = true);
            rotaryInputs.forEach(input => {
                input.required = false;
                input.value = '';
            });
        }
    }
</script>

</body>
</html>
